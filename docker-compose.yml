version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ses_automator_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ses_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ses_password}
      POSTGRES_DB: ${POSTGRES_DB:-ses_automator}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ses_user} -d ${POSTGRES_DB:-ses_automator}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
