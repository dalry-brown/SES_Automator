name: Deploy Backend to Azure Container Apps

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  IMAGE_NAME: ses-automator-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ secrets.REGISTRY_NAME }}

      - name: Build and push Docker image
        run: |
          docker build -t sesautomatoracr.azurecr.io/${{ env.IMAGE_NAME }}:latest ./backend
          docker push sesautomatoracr.azurecr.io/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName: sesautomatoracr
          acrUsername: ${{ secrets.REGISTRY_USERNAME }}
          acrPassword: ${{ secrets.REGISTRY_PASSWORD }}
          azureCredentials: ${{ secrets.AZURE_CREDENTIALS }}
          containerAppName: ses-automator-api
          resourceGroup: ses-automator-rg
          imageToDeploy: sesautomatoracr.azurecr.io/${{ env.IMAGE_NAME }}:latest
          targetPort: 8080
          ingress: external
